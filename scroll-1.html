o<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Verticals | Balaji Hitech Pvt. Ltd.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Business Verticals Styles */
    :root {
      --blue-deep:   #0d3f72;
      --blue-mid:    #185FA5;
      --blue-bright: #2980d4;
      --blue-light:  #e6f1fb;
      --green-bg:    #eaf3de;
      --teal-bg:     #e1f5ee;
      --amber-bg:    #faeeda;
      --coral-bg:    #faece7;
      --purple-bg:   #eeedfe;
      --text-primary: #1a2636;
      --text-muted:   #5a6a7e;
      --border:       rgba(24,95,165,0.12);
      --card-bg:      #ffffff;
      --page-bg:      #f2f5f9;
      --radius:       14px;
      --shadow-hover: 0 16px 40px -10px rgba(13,63,114,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--page-bg);
      line-height: 1.6;
      color: var(--text-primary);
    }

    .scroll-one-section {
      background: linear-gradient(135deg, #f8fbff 0%, #f4f9fe 100%);
      padding: 5rem 1rem;
    }

    .scroll-one-section .container {
      padding-right: 2rem;
      max-width: 100%;
    }
    @media (max-width: 768px) {
      .products .container {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
    }

    .scroll-one-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
    }
    @media (max-width: 768px) {
      .business-section {
        padding: 0 1.5rem;
      }
    }

    .scroll-one-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .scroll-one-badge {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue-bright);
      background: var(--blue-light);
      padding: 4px 14px;
      border-radius: 100px;
      margin-bottom: 14px;
    }

    .scroll-one-heading {
      font-family: 'Inter', sans-serif;
      font-size: clamp(30px, 5vw, 46px);
      font-weight: 700;
      color: #0f3f6b;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .scroll-one-subtitle {
      font-size: 15px;
      color: var(--text-muted);
      font-weight: 400;
      max-width: 460px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Grid ── */
    .business-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem 1.5rem;
      margin-top: 1rem;
    }
    @media (max-width: 640px) {
      .business-grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Card ── */
    .business-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.6rem 1.5rem;
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(.22,.68,0,1.25),
                  box-shadow 0.3s ease,
                  border-color 0.3s ease;
      opacity: 0;
      transform: translateY(28px);
    }

    .business-card.visible {
      animation: cardIn 0.5s cubic-bezier(.22,.68,0,1.2) forwards;
    }

    .business-card:nth-child(1).visible { animation-delay: 0.04s; }
    .business-card:nth-child(2).visible { animation-delay: 0.12s; }
    .business-card:nth-child(3).visible { animation-delay: 0.20s; }
    .business-card:nth-child(4).visible { animation-delay: 0.28s; }
    .business-card:nth-child(5).visible { animation-delay: 0.36s; }
    .business-card:nth-child(6).visible { animation-delay: 0.44s; }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .business-card::before,
    .business-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius);
      pointer-events: none;
      transition: clip-path .42s cubic-bezier(.4,0,.2,1);
    }

    .business-card::before {
      border-top: 2.5px solid var(--accent, var(--blue-mid));
      border-left: 2.5px solid var(--accent, var(--blue-mid));
      border-bottom: 2.5px solid transparent;
      border-right: 2.5px solid transparent;
      clip-path: inset(0 100% 100% 0);
    }

    .business-card::after {
      border-bottom: 2.5px solid var(--accent, var(--blue-mid));
      border-right: 2.5px solid var(--accent, var(--blue-mid));
      border-top: 2.5px solid transparent;
      border-left: 2.5px solid transparent;
      clip-path: inset(100% 0 0 100%);
    }

    .business-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(24,95,165,0.22);
    }

    .business-card:hover::before,
    .business-card:hover::after { clip-path: inset(0 0 0 0); }
.business-card:hover .business-icon-wrap { transform: scale(1.1) rotate(-5deg); }
    .business-card:hover .business-btn { background: var(--blue-deep); letter-spacing: 0.1em; }

    .scroll-one-icon {
      width: 64px; height: 64px; border-radius: 12px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      transition: transform 0.35s cubic-bezier(.22,.68,0,1.4);
      background: var(--icon-bg, var(--blue-light));
      position: relative; overflow: hidden;
    }

    .business-body { flex: 1; min-width: 0; }

    .business-name {
      font-family: 'Inter', sans-serif;
      font-size: 15px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--blue-mid); margin-bottom: 7px; line-height: 1.25;
    }

    .business-desc {
      font-size: 14px; color: var(--text-muted);
      line-height: 1.65; margin-bottom: 14px;
      font-family: 'Inter', sans-serif; font-weight: 400;
    }

    .business-btn {
      display: inline-block; font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: #fff; background: var(--blue-mid);
      border: none; border-radius: 8px;
      padding: 8px 16px; cursor: pointer;
      transition: all 0.22s ease;
    }

    /* Card color themes */
    .card-blue   { --accent: #185FA5; --icon-bg: #e6f1fb; }
    .card-green  { --accent: #3B6D11; --icon-bg: #eaf3de; }
    .card-teal   { --accent: #0F6E56; --icon-bg: #e1f5ee; }
    .card-amber  { --accent: #BA7517; --icon-bg: #faeeda; }
    .card-coral  { --accent: #993C1D; --icon-bg: #faece7; }
    .card-purple { --accent: #534AB7; --icon-bg: #eeedfe; }
  </style>
</head>
<body>
<section class="scroll-one-section" id="business-areas">
    <div class="container">
      <div class="scroll-one-container">

        <div class="business-grid">
          <!-- Card 1 -->
         <!-- Card 1 -->
        <article class="business-card card-blue">
        <div class="business-icon-wrap">
        <!-- Clock + Check (On-Time Delivery) -->
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 7v5l3 2"/>
        <path d="M8 12l2 2 4-4" stroke="#378ADD"/>
        </svg>
  </div>
  <div class="business-body">
    <p class="business-name">On-Time, Predictable Delivery</p>
  </div>
</article>

<!-- Card 2 -->
<article class="business-card card-green">
  <div class="business-icon-wrap">
    <!-- User + Heart (Client Centric) -->
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2">
      <circle cx="12" cy="8" r="3"/>
      <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/>
      <path d="M12 17l2-2a1.5 1.5 0 0 0-2-2 1.5 1.5 0 0 0-2 2l2 2z" fill="#97C459"/>
    </svg>
  </div>
  <div class="business-body">
    <p class="business-name">Client-Centric Approach</p>
  </div>
</article>

<!-- Card 3 -->
<article class="business-card card-teal">
  <div class="business-icon-wrap">
    <!-- Gear (Engineering Design) -->
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1L14 2h-4l-.9 3a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1L10 22h4l.9-3a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5c.1-.3.1-.7.1-1z"/>
    </svg>
  </div>
  <div class="business-body">
    <p class="business-name">Engineering-led Design Excellence</p>
  </div>
</article>

<!-- Card 4 -->
<article class="business-card card-amber">
  <div class="business-icon-wrap">
    <!-- Flow / Process (EPC) -->
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="2">
      <rect x="3" y="4" width="6" height="6"/>
      <rect x="15" y="4" width="6" height="6"/>
      <rect x="9" y="14" width="6" height="6"/>
      <path d="M9 7h6M12 10v4"/>
    </svg>
  </div>
  <div class="business-body">
    <p class="business-name">Integrated EPC Capability</p>
  </div>
</article>

<!-- Card 5 -->
<article class="business-card card-coral">
  <div class="business-icon-wrap">
    <!-- Shield (Safety & Quality) -->
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="2">
      <path d="M12 3l7 3v6c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V6l7-3z"/>
      <path d="M9 12l2 2 4-4" stroke="#D85A30"/>
    </svg>
  </div>
  <div class="business-body">
    <p class="business-name">Quality & Safety Focus</p>
  </div>
</article>

<!-- Card 6 -->
<article class="business-card card-purple">
  <div class="business-icon-wrap">
    <!-- Growth Graph (Experience) -->
    <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2">
      <path d="M3 17l6-6 4 4 7-7"/>
      <path d="M3 21h18"/>
    </svg>
  </div>
  <div class="business-body">
    <p class="business-name">Proven Execution Experience</p>
  </div>
</article>
        </div>

        <script>
          const businessCards = document.querySelectorAll('.business-card');
          const businessObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                businessObserver.unobserve(entry.target);
              }
            });
          }, { threshold: 0.12 });
          businessCards.forEach(card => businessObserver.observe(card));
        </script>
      </div>
    </div>
  </section>
</body>
</html>

<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Footer Layout | Balaji Hitech Pvt. Ltd.</title>
  <link href="Footer%20Layout%20_%20Balaji%20Hitech%20Pvt.%20Ltd_files/css2.css" rel="stylesheet">
  <style>
    /* Business Verticals Styles + Footer Layout */
    :root {
      --blue-deep: #0d3f72;
      --blue-mid: #185FA5;
      --blue-bright: #2980d4;
      --blue-light: #e6f1fb;
      --green-bg: #eaf3de;
      --teal-bg: #e1f5ee;
      --amber-bg: #faeeda;
      --coral-bg: #faece7;
      --purple-bg: #eeedfe;
      --text-primary: #1a2636;
      --text-muted: #5a6a7e;
      --border: rgba(24,95,165,0.12);
      --card-bg: #ffffff;
      --page-bg: #f2f5f9;
      --radius: 14px;
      --shadow-hover: 0 16px 40px -10px rgba(13,63,114,0.18);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--page-bg);
      line-height: 1.6;
      color: var(--text-primary);
      padding: 2rem;
    }

    /* 🎯 NEW: Footer Visual Section Layout */
    .footer-visual-section {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 2rem;
      align-items: stretch;
      height: 330px; /* Reduced to match new 110px cards × 3 */
    }

    .footer-image {
      flex: 0 0 40%;
      height: 330px; /* Ultra-compact matching new 110px cards */
      background: linear-gradient(135deg, #e6f1fb 0%, #f4f9fe 100%);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    /* Clean image - no effects */
    .footer-image:hover {
      transform: none;
    }

    .footer-image img {
      transition: none;
    }

    .footer-image::before {
      content: 'Workshop Image Placeholder';
      font-size: 1.1rem;
      color: var(--text-muted);
      text-align: center;
      padding: 2rem;
      font-weight: 500;
    }

    .cards-wrapper {
      flex: 0 0 60%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      height: 330px; /* Exact image div height match */
    }
    
    /* Reuse business card styles */
    .business-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem; /* Tighter for exact height */
      display: flex;
      gap: 0.8rem;
      align-items: center; /* Center align for exact height */
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(.22,.68,0,1.25),
                  box-shadow 0.3s ease, border-color 0.3s ease;
      height: 100%; /* Full container height */
      opacity: 0;
      transform: translateY(28px);
    }

    .business-card.visible {
      animation: cardIn 0.5s cubic-bezier(.22,.68,0,1.2) forwards;
    }

    .business-card:nth-child(1).visible { animation-delay: 0.04s; }
    .business-card:nth-child(2).visible { animation-delay: 0.12s; }
    .business-card:nth-child(3).visible { animation-delay: 0.20s; }
    .business-card:nth-child(4).visible { animation-delay: 0.28s; }
    .business-card:nth-child(5).visible { animation-delay: 0.36s; }
    .business-card:nth-child(6).visible { animation-delay: 0.44s; }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Corner border effects */
    .business-card::before, .business-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: var(--radius);
      pointer-events: none;
      transition: clip-path 0.42s cubic-bezier(.4,0,.2,1);
    }

    .business-card::before {
      border-top: 2.5px solid var(--accent, var(--blue-mid));
      border-left: 2.5px solid var(--accent, var(--blue-mid));
      border-bottom: 2.5px solid transparent;
      border-right: 2.5px solid transparent;
      clip-path: inset(0 100% 100% 0);
    }

    .business-card::after {
      border-bottom: 2.5px solid var(--accent, var(--blue-mid));
      border-right: 2.5px solid var(--accent, var(--blue-mid));
      border-top: 2.5px solid transparent;
      border-left: 2.5px solid transparent;
      clip-path: inset(100% 0 0 100%);
    }

    .business-card:hover {
      background: var(--blue-deep) !important;
      color: white !important;
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
      border-color: rgba(24,95,165,0.22);
    }

    .business-card:hover .business-name,
    .business-card:hover .business-desc {
      color: white !important;
    }

    /* SVG color preserved - no change */

    .business-card:hover::before,
    .business-card:hover::after { 
      clip-path: inset(0 0 0 0); 
    }

    .business-icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.35s cubic-bezier(.22,.68,0,1.4);
      background: var(--icon-bg, var(--blue-light));
      position: relative;
      overflow: hidden;
    }

    .business-card:hover .business-icon-wrap {
      transform: scale(1.1);
    }

    .business-icon-wrap svg {
      width: 32px;
      height: 32px;
    }

    .business-body { flex: 1; min-width: 0; }

    .business-name {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--blue-mid);
      margin-bottom: 7px;
      line-height: 1.25;
    }

    .business-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 14px;
      font-weight: 400;
    }

    .business-btn {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      background: var(--blue-mid);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.22s ease;
    }

    /* 6 Color Themes */
    .card-blue   { --accent: #185FA5; --icon-bg: #e6f1fb; }
    .card-green  { --accent: #3B6D11; --icon-bg: #eaf3de; }
    .card-teal   { --accent: #0F6E56; --icon-bg: #e1f5ee; }
    .card-amber  { --accent: #BA7517; --icon-bg: #faeeda; }
    .card-coral  { --accent: #993C1D; --icon-bg: #faece7; }
    .card-purple { --accent: #534AB7; --icon-bg: #eeedfe; }

    /* Responsive */
    @media (max-width: 768px) {
      .footer-visual-section {
        flex-direction: column;
      }
      .footer-image, .cards-wrapper {
        flex: none;
        width: 100%;
      }
      .cards-wrapper {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- 🎯 40% Image + 60% Cards Layout -->
  <div class="footer-visual-section">
    <!-- 40% Image Placeholder -->
    <div class="footer-image">
      <!-- Replace src below with actual workshop image -->
      <img src="Footer%20Layout%20_%20Balaji%20Hitech%20Pvt.%20Ltd_files/scroll-2.png" alt="Balaji Workshop Facility" style="width: 100%; height: 100%; object-fit: cover; border-radius: calc(var(--radius) - 2px);">
    </div>

    <!-- 60% Cards - 2 Columns, 6 Cards -->
    <div class="cards-wrapper">
      <!-- Card 1 - Blue -->
      <article class="business-card card-blue visible">
        <div class="business-icon-wrap">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 7v5l3 2"></path>
            <path d="M8 12l2 2 4-4" stroke="#378ADD"></path>
          </svg>
        </div>
        <div class="business-body">
          <p class="business-name">On-Time Delivery</p>
          <p class="business-desc">Predictable project timelines</p>
        </div>
      </article>

      <!-- Card 2 - Green -->
      <article class="business-card card-green visible">
        <div class="business-icon-wrap">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#3B6D11" stroke-width="2">
            <circle cx="12" cy="8" r="3"></circle>
            <path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"></path>
            <path d="M12 17l2-2a1.5 1.5 0 0 0-2-2 1.5 1.5 0 0 0-2 2l2 2z" fill="#97C459"></path>
          </svg>
        </div>
        <div class="business-body">
          <p class="business-name">Client Focus</p>
          <p class="business-desc">Customer-first approach</p>
        </div>
      </article>

      <!-- Card 3 - Teal -->
      <article class="business-card card-teal visible">
        <div class="business-icon-wrap">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1L14 2h-4l-.9 3a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1L10 22h4l.9-3a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5c.1-.3.1-.7.1-1z"></path>
          </svg>
        </div>
        <div class="business-body">
          <p class="business-name">Design Excellence</p>
          <p class="business-desc">Engineering precision</p>
        </div>
      </article>

      <!-- Card 4 - Amber -->
      <article class="business-card card-amber visible">
        <div class="business-icon-wrap">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#BA7517" stroke-width="2">
            <rect x="3" y="4" width="6" height="6"></rect>
            <rect x="15" y="4" width="6" height="6"></rect>
            <rect x="9" y="14" width="6" height="6"></rect>
            <path d="M9 7h6M12 10v4"></path>
          </svg>
        </div>
        <div class="business-body">
          <p class="business-name">Integrated EPC</p>
          <p class="business-desc">End-to-end solutions</p>
        </div>
      </article>

      <!-- Card 5 - Coral -->
      <article class="business-card card-coral visible">
        <div class="business-icon-wrap">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#993C1D" stroke-width="2">
            <path d="M12 3l7 3v6c0 5-3.5 7.5-7 9-3.5-1.5-7-4-7-9V6l7-3z"></path>
            <path d="M9 12l2 2 4-4" stroke="#D85A30"></path>
          </svg>
        </div>
        <div class="business-body">
          <p class="business-name">Quality &amp; Safety</p>
          <p class="business-desc">Industry standards</p>
        </div>
      </article>

      <!-- Card 6 - Purple -->
      <article class="business-card card-purple visible">
        <div class="business-icon-wrap">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2">
            <path d="M3 17l6-6 4 4 7-7"></path>
            <path d="M3 21h18"></path>
          </svg>
        </div>
        <div class="business-body">
          <p class="business-name">Proven Experience</p>
          <p class="business-desc">Years of execution</p>
        </div>
      </article>
    </div>
  </div>


  <script>
    const cards = document.querySelectorAll('.business-card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });

    cards.forEach(card => observer.observe(card));
  </script>



</body></html>
